apply plugin: 'java-library'

group 'be.tarsos.dsp'
version '2.4'

java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
}

sourceSets {
    main {
        java {
            srcDirs = ['src/main/java']
            exclude '**/module-info.java'
        }
    }
}
